<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Adda — Scene</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .page-wrap { max-width: 780px; margin: 0 auto; padding: 28px 24px; }

    /* BACK */
    .back-btn {
      display: inline-flex; align-items: center; gap: 8px;
      color: #888; font-size: 0.82rem; font-weight: 700; text-decoration: none;
      margin-bottom: 20px; transition: color 0.15s; letter-spacing: 0.5px;
    }
    .back-btn:hover { color: var(--saffron); }

    /* SCENE CARD */
    .scene-card {
      background: white; border: 1.5px solid var(--border);
      padding: 28px; margin-bottom: 20px; position: relative; overflow: hidden;
    }
    .scene-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
      background: var(--saffron);
    }
    .scene-top { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; }
    .scene-avatar {
      width: 52px; height: 52px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 1rem; color: white; flex-shrink: 0;
    }
    .scene-meta { flex: 1; }
    .scene-name { font-weight: 800; font-size: 1.05rem; color: var(--dark); }
    .scene-college { font-size: 0.8rem; color: #888; margin-top: 3px; }
    .scene-college strong { color: var(--saffron); }
    .scene-time { font-size: 0.72rem; color: #bbb; font-weight: 600; }

    .scene-text { font-size: 1.15rem; line-height: 1.7; color: #111; margin-bottom: 20px; font-weight: 500; }

    .scene-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
    .scene-tag {
      padding: 6px 14px; font-size: 0.75rem; font-weight: 700;
      letter-spacing: 0.5px; border: 1.5px solid var(--border); color: #555;
    }

    .scene-actions { display: flex; gap: 10px; align-items: center; }
    .down-btn-lg {
      background: var(--dark); color: white; border: none;
      padding: 12px 28px; font-family: 'Syne', sans-serif;
      font-weight: 800; font-size: 0.95rem; cursor: pointer;
      transition: all 0.2s; letter-spacing: 0.5px; flex: 1;
    }
    .down-btn-lg:hover { background: var(--saffron); }
    .down-btn-lg.is-down { background: #22c55e; }
    .down-btn-lg.is-down:hover { background: #16a34a; }
    .share-btn-lg {
      background: none; border: 1.5px solid var(--border);
      padding: 11px 20px; cursor: pointer; font-size: 0.9rem;
      color: #888; transition: all 0.15s; font-family: 'Syne', sans-serif;
      font-weight: 700;
    }
    .share-btn-lg:hover { border-color: var(--saffron); color: var(--saffron); }
    .down-count-lg {
      font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem;
      color: var(--saffron); white-space: nowrap;
    }

    /* EXPIRY */
    .expiry-block {
      background: #fafafa; border: 1.5px solid var(--border);
      padding: 14px 20px; margin-bottom: 20px;
      display: flex; align-items: center; gap: 16px;
    }
    .expiry-label { font-size: 0.75rem; font-weight: 700; color: #888; letter-spacing: 1px; text-transform: uppercase; }
    .expiry-bar-wrap { flex: 1; }
    .expiry-bar-bg { height: 6px; background: rgba(0,0,0,0.08); }
    .expiry-bar-fill { height: 100%; background: linear-gradient(90deg, var(--saffron), var(--hot-pink)); transition: width 1s linear; }
    .expiry-time { font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; color: var(--dark); white-space: nowrap; }

    /* WHO'S DOWN */
    .section-box { background: white; border: 1.5px solid var(--border); margin-bottom: 20px; }
    .section-box-header {
      padding: 16px 20px; border-bottom: 1.5px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .section-box-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 2px; color: var(--dark); }
    .section-box-body { padding: 16px 20px; }

    .attendee {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 14px; background: #fafafa; border: 1px solid var(--border);
      margin-bottom: 8px; transition: background 0.15s;
    }
    .attendee:last-child { margin-bottom: 0; }
    .attendee:hover { background: rgba(255,107,26,0.04); }
    .att-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 0.78rem; color: white; flex-shrink: 0;
    }
    .att-name { font-weight: 700; font-size: 0.88rem; color: var(--dark); }
    .att-college { font-size: 0.72rem; color: #999; }
    .att-time { font-size: 0.7rem; color: #ccc; margin-left: auto; font-weight: 600; }

    /* GROUP CHAT */
    .chat-box { background: white; border: 1.5px solid var(--border); }
    .chat-header {
      padding: 16px 20px; border-bottom: 1.5px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      background: var(--dark);
    }
    .chat-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 2px; color: var(--cream); }
    .chat-note { font-size: 0.72rem; color: rgba(255,248,238,0.4); font-weight: 600; }
    .chat-messages { height: 360px; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); }

    .chat-msg { display: flex; gap: 10px; animation: slideIn 0.2s ease; }
    .chat-msg.own { flex-direction: row-reverse; }
    .msg-avatar {
      width: 30px; height: 30px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 0.68rem; color: white; flex-shrink: 0; align-self: flex-end;
    }
    .msg-bubble {
      max-width: 72%; background: #f5f5f5;
      padding: 10px 14px; border-radius: 2px;
    }
    .chat-msg.own .msg-bubble { background: var(--dark); color: var(--cream); }
    .msg-sender { font-size: 0.7rem; font-weight: 700; color: var(--saffron); margin-bottom: 4px; }
    .chat-msg.own .msg-sender { display: none; }
    .msg-text { font-size: 0.9rem; line-height: 1.5; }
    .msg-time { font-size: 0.65rem; color: rgba(0,0,0,0.3); margin-top: 4px; text-align: right; }
    .chat-msg.own .msg-time { color: rgba(255,255,255,0.3); }

    .chat-input-wrap {
      padding: 14px 16px; border-top: 1.5px solid var(--border);
      display: flex; gap: 10px;
    }
    .chat-input {
      flex: 1; border: 1.5px solid var(--border);
      padding: 10px 16px; font-family: 'Syne', sans-serif; font-size: 0.9rem;
      outline: none; transition: border-color 0.2s; background: #fafafa;
    }
    .chat-input:focus { border-color: var(--saffron); background: white; }
    .chat-send {
      background: var(--saffron); color: white; border: none;
      padding: 10px 20px; font-family: 'Syne', sans-serif; font-weight: 800;
      font-size: 0.85rem; cursor: pointer; transition: background 0.15s;
    }
    .chat-send:hover { background: #e55a0f; }

    .chat-locked {
      padding: 32px; text-align: center;
      border-top: 1.5px solid var(--border);
    }
    .chat-locked p { color: #888; font-size: 0.9rem; margin-bottom: 16px; }

    .system-msg {
      text-align: center; font-size: 0.75rem; color: #aaa;
      font-style: italic; padding: 4px 0;
    }

    /* NOT FOUND */
    .not-found { text-align: center; padding: 100px 24px; }
    .not-found-emoji { font-size: 4rem; display: block; margin-bottom: 20px; }
    .not-found-title { font-family: 'Bebas Neue', sans-serif; font-size: 3rem; color: var(--dark); margin-bottom: 12px; }
  </style>
</head>
<body>

  <nav class="topbar">
    <a href="index.html" class="topbar-logo">Add<span>a</span></a>
    <div class="topbar-nav">
      <a href="feed.html" class="nav-link">Feed</a>
      <a href="notifications.html" class="nav-link nav-notif">
        Notifications<span class="notif-badge" id="notifBadge"></span>
      </a>
      <a href="profile.html" class="nav-link">Profile</a>
    </div>
    <button class="post-btn" onclick="openPostModal()">+ Scene Banao</button>
  </nav>

  <div class="page-wrap">
    <a href="feed.html" class="back-btn">← Feed Pe Wapas</a>
    <div id="sceneContent"></div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/app.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const sceneId = params.get('id');
    let currentUser = DB.getUser();
    let scenes = DB.getScenes();
    let scene = scenes.find(s => s.id === sceneId);

    // =====================
    // FAKE ATTENDEES for seeded scenes
    // =====================
    const fakeAttendees = [
      { name: 'Anjali M.', college: 'Miranda House', color: 2, offset: 300000 },
      { name: 'Rohan K.', college: 'Hindu College', color: 3, offset: 600000 },
      { name: 'Simran P.', college: 'LSR', color: 5, offset: 900000 },
      { name: 'Vivek S.', college: 'Hansraj College', color: 0, offset: 1200000 },
      { name: 'Diksha R.', college: 'Ramjas College', color: 4, offset: 1500000 },
      { name: 'Mehul A.', college: 'Kirori Mal', color: 1, offset: 1800000 },
      { name: 'Tanya S.', college: 'St. Stephen\'s', color: 2, offset: 2100000 },
      { name: 'Arjit B.', college: 'Daulat Ram', color: 3, offset: 2400000 },
    ];

    const fakeMsgs = [
      { name: 'Anjali M.', color: 2, text: 'Sounds amazing! Main bhi aa rahi hoon 🙌' },
      { name: 'Rohan K.', color: 3, text: 'Bhai kitne baje exact? Location share karo' },
      { name: 'Simran P.', color: 5, text: 'We\'re coming from North Campus, koi aur hai udhar se?' },
      { name: 'Vivek S.', color: 0, text: 'Metro se aana easy hai yahan, tension mat lo' },
    ];

    // =====================
    // RENDER
    // =====================
    function render() {
      scenes = DB.getScenes();
      scene = scenes.find(s => s.id === sceneId);

      if (!scene) {
        document.getElementById('sceneContent').innerHTML = `
          <div class="not-found">
            <span class="not-found-emoji">🌫️</span>
            <div class="not-found-title">Scene Expire Ho Gaya</div>
            <p style="color:#888;margin-bottom:24px;">Ya toh delete ho gaya ya 24 hours pehle tha.</p>
            <a href="feed.html" class="post-btn" style="display:inline-block;padding:12px 28px;text-decoration:none;">Feed Pe Ja →</a>
          </div>`;
        return;
      }

      const isDown = currentUser && scene.downedBy.includes(currentUser.phone);
      const isMine = currentUser && scene.name === currentUser.name && scene.college === currentUser.college;
      const vibe = VIBES[scene.vibe] || { emoji: '🔥', label: scene.vibe };
      const expiry = Utils.expiryPct(scene.timestamp);
      const hoursLeft = Math.max(0, 24 - Math.floor((Date.now() - scene.timestamp) / 3600000));

      // Attendees: real + fake for seed scenes
      const realAttendees = (scene.downedBy || []);
      const seedFake = scene.id.startsWith('seed') ? fakeAttendees.slice(0, scene.downCount) : [];

      // Messages: seed scenes get fake messages
      const msgs = scene.messages || [];
      const seedMsgs = scene.id.startsWith('seed') && msgs.length === 0 ? fakeMsgs.slice(0, 3) : [];

      document.getElementById('sceneContent').innerHTML = `
        <!-- SCENE CARD -->
        <div class="scene-card">
          <div class="scene-top">
            <div class="scene-avatar av-${scene.avatarColor}">${Utils.initials(scene.name)}</div>
            <div class="scene-meta">
              <div class="scene-name">${scene.name}</div>
              <div class="scene-college"><strong>${scene.college}</strong> · Delhi University</div>
            </div>
            <div class="scene-time">${Utils.timeAgo(scene.timestamp)}</div>
          </div>
          <p class="scene-text">${scene.text}</p>
          <div class="scene-tags">
            <span class="scene-tag">${vibe.emoji} ${vibe.label}</span>
            <span class="scene-tag">📍 ${scene.area}</span>
            <span class="scene-tag">⏰ ${scene.when}</span>
            ${isMine ? '<span class="scene-tag tag-green" style="background:rgba(34,197,94,0.1);color:#16a34a;border:none;">✓ Tera Scene</span>' : ''}
          </div>
          <div class="scene-actions">
            <button class="down-btn-lg ${isDown ? 'is-down' : ''}" id="mainDownBtn" onclick="toggleDown()">
              ${isDown ? '✓ Down Hai Tu!' : "Main Down Hoon →"}
            </button>
            <button class="share-btn-lg" onclick="shareScene()">↗ Share</button>
            <span class="down-count-lg" id="mainDownCount">${scene.downCount} DOWN</span>
          </div>
        </div>

        <!-- EXPIRY -->
        <div class="expiry-block">
          <div>
            <div class="expiry-label">Scene Expires In</div>
          </div>
          <div class="expiry-bar-wrap">
            <div class="expiry-bar-bg">
              <div class="expiry-bar-fill" style="width:${expiry}%"></div>
            </div>
          </div>
          <div class="expiry-time">${hoursLeft}H LEFT</div>
        </div>

        <!-- WHO'S DOWN -->
        <div class="section-box">
          <div class="section-box-header">
            <span class="section-box-title">Kaun Hai Down (${scene.downCount})</span>
          </div>
          <div class="section-box-body" id="attendeesList">
            ${seedFake.map(p => `
              <div class="attendee">
                <div class="att-avatar av-${p.color}">${Utils.initials(p.name)}</div>
                <div>
                  <div class="att-name">${p.name}</div>
                  <div class="att-college">${p.college}</div>
                </div>
                <div class="att-time">${Utils.timeAgo(scene.timestamp + p.offset)}</div>
              </div>`).join('')}
            ${realAttendees.length === 0 && seedFake.length === 0 ? `
              <div style="text-align:center;padding:24px;color:#aaa;">
                <span style="font-size:1.5rem;display:block;margin-bottom:8px;">👀</span>
                <p style="font-size:0.88rem;">Abhi koi nahi. Tu pehla ho!</p>
              </div>` : ''}
          </div>
        </div>

        <!-- GROUP CHAT -->
        <div class="chat-box">
          <div class="chat-header">
            <span class="chat-title">Group Chat</span>
            <span class="chat-note">Auto-deletes after scene ends</span>
          </div>
          <div class="chat-messages" id="chatMessages">
            <div class="system-msg">💬 Scene group chat start hua — sirf scene members dekh sakte hain</div>
            ${[...seedMsgs, ...msgs].map(m => renderMsg(m, false)).join('')}
          </div>
          ${currentUser ? `
            <div class="chat-input-wrap">
              <input class="chat-input" id="chatInput" placeholder="Kuch bolo..." maxlength="200"
                onkeydown="if(event.key==='Enter')sendMsg()" />
              <button class="chat-send" onclick="sendMsg()">Bhejo →</button>
            </div>` : `
            <div class="chat-locked">
              <p>Chat join karne ke liye login karo</p>
              <button class="post-btn" onclick="openLoginModal()">Login Karo</button>
            </div>`}
        </div>
      `;

      scrollChat();
    }

    function renderMsg(m, isOwn) {
      return `
        <div class="chat-msg ${isOwn ? 'own' : ''}">
          ${!isOwn ? `<div class="msg-avatar av-${m.color || Utils.avatarColor(m.name)}">${Utils.initials(m.name)}</div>` : ''}
          <div class="msg-bubble">
            ${!isOwn ? `<div class="msg-sender">${m.name} · ${m.college || ''}</div>` : ''}
            <div class="msg-text">${m.text}</div>
            <div class="msg-time">${Utils.timeAgo(m.timestamp || Date.now())}</div>
          </div>
          ${isOwn ? `<div class="msg-avatar av-${Utils.avatarColor(m.name)}">${Utils.initials(m.name)}</div>` : ''}
        </div>`;
    }

    function scrollChat() {
      const c = document.getElementById('chatMessages');
      if (c) c.scrollTop = c.scrollHeight;
    }

    // =====================
    // INTERACTIONS
    // =====================
    function toggleDown() {
      if (!currentUser) { showToast('Pehle login kar bhai 😅', 'error'); openLoginModal(); return; }
      scenes = DB.getScenes();
      scene = scenes.find(s => s.id === sceneId);
      if (!scene) return;
      const idx = scene.downedBy.indexOf(currentUser.phone);
      if (idx === -1) {
        scene.downedBy.push(currentUser.phone);
        scene.downCount++;
        showToast('Scene mein hai tu! 🔥', 'success');
        Utils.addNotification({ type:'down', text:`Tu ${scene.name} ke scene pe down hua`, sceneId });
      } else {
        scene.downedBy.splice(idx, 1);
        scene.downCount--;
        showToast('Down se hat gaya', '');
      }
      DB.saveScenes(scenes);
      render();
    }

    function sendMsg() {
      if (!currentUser) return;
      const input = document.getElementById('chatInput');
      const text = input.value.trim();
      if (!text) return;
      scenes = DB.getScenes();
      scene = scenes.find(s => s.id === sceneId);
      if (!scene) return;
      if (!scene.messages) scene.messages = [];
      const msg = {
        name: currentUser.name, college: currentUser.college,
        phone: currentUser.phone, text, timestamp: Date.now(),
        color: Utils.avatarColor(currentUser.name)
      };
      scene.messages.push(msg);
      DB.saveScenes(scenes);
      input.value = '';
      const container = document.getElementById('chatMessages');
      const isOwn = true;
      container.insertAdjacentHTML('beforeend', renderMsg(msg, isOwn));
      scrollChat();
    }

    function shareScene() {
      const url = window.location.href;
      const text = `${scene.text} — ${scene.area} | Check on Adda`;
      if (navigator.share) navigator.share({ title: 'Adda Scene', text, url });
      else { navigator.clipboard.writeText(url); showToast('Link copy ho gaya! 📤'); }
    }

    // =====================
    // CALLBACKS
    // =====================
    function onLoginComplete(user) {
      currentUser = user;
      setTimeout(() => render(), 400);
    }
    function onScenePosted() {
      window.location.href = 'feed.html';
    }

    render();
  </script>
</body>
</html>
