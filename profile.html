<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Adda — Tera Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --saffron: #FF6B1A;
      --deep-teal: #0A3D3D;
      --cream: #FFF8EE;
      --hot-pink: #FF2D6B;
      --soft-yellow: #FFE566;
      --dark: #0D1117;
      --border: rgba(0,0,0,0.08);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background: #F5F0E8; font-family: 'Syne', sans-serif; min-height: 100vh; }

    /* TOPBAR */
    .topbar {
      background: var(--dark); padding: 0 24px;
      display: flex; align-items: center; justify-content: space-between;
      height: 60px; position: sticky; top: 0; z-index: 100;
    }
    .topbar-logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; color: var(--cream); letter-spacing: 2px; text-decoration: none; }
    .topbar-logo span { color: var(--saffron); }
    .topbar-nav { display: flex; gap: 8px; }
    .nav-link {
      color: rgba(255,248,238,0.6); font-size: 0.82rem; font-weight: 700;
      text-decoration: none; padding: 7px 16px; transition: color 0.15s;
      letter-spacing: 0.5px;
    }
    .nav-link:hover { color: var(--cream); }
    .nav-link.active { color: var(--saffron); }
    .post-btn {
      background: var(--saffron); color: white; border: none; padding: 8px 20px;
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 0.85rem;
      cursor: pointer; transition: transform 0.15s, background 0.15s;
    }
    .post-btn:hover { background: #e55a0f; transform: translateY(-1px); }

    /* LAYOUT */
    .layout {
      max-width: 900px; margin: 0 auto; padding: 32px 24px;
      display: grid; grid-template-columns: 280px 1fr; gap: 24px;
    }

    /* PROFILE CARD */
    .profile-card {
      background: white; border: 1.5px solid var(--border);
      position: sticky; top: 84px; height: fit-content;
      overflow: hidden;
    }
    .profile-banner {
      height: 80px;
      background: linear-gradient(135deg, var(--deep-teal), #1a6b6b);
      position: relative;
    }
    .profile-banner::after {
      content: 'ADDA';
      font-family: 'Bebas Neue', sans-serif;
      font-size: 4rem;
      color: rgba(255,255,255,0.06);
      position: absolute;
      bottom: -8px; right: 8px;
      letter-spacing: 4px;
    }
    .profile-avatar-wrap {
      padding: 0 20px;
      margin-top: -28px;
      margin-bottom: 16px;
    }
    .profile-avatar {
      width: 56px; height: 56px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem;
      color: white; border: 3px solid white;
      background: var(--saffron);
    }
    .profile-info { padding: 0 20px 20px; }
    .profile-name { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: 1px; color: var(--dark); }
    .profile-college { font-size: 0.82rem; color: #888; font-weight: 600; margin-bottom: 16px; }
    .profile-college strong { color: var(--saffron); }

    /* SCORE */
    .score-block {
      background: var(--dark); padding: 16px; margin: 0 20px 20px;
      display: flex; align-items: center; gap: 16px;
    }
    .score-num {
      font-family: 'Bebas Neue', sans-serif; font-size: 3rem;
      color: var(--saffron); line-height: 1;
    }
    .score-info { flex: 1; }
    .score-label { font-size: 0.7rem; font-weight: 700; letter-spacing: 2px; color: rgba(255,248,238,0.5); text-transform: uppercase; }
    .score-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; color: var(--cream); letter-spacing: 1px; }
    .score-bar-wrap { margin: 0 20px 20px; }
    .score-bar-label { font-size: 0.72rem; font-weight: 700; color: #aaa; letter-spacing: 1px; margin-bottom: 6px; display: flex; justify-content: space-between; }
    .score-bar { height: 6px; background: rgba(0,0,0,0.08); border-radius: 0; overflow: hidden; margin-bottom: 10px; }
    .score-bar-fill { height: 100%; background: var(--saffron); border-radius: 0; transition: width 1s ease; }

    /* STATS ROW */
    .stats-row {
      display: grid; grid-template-columns: repeat(3, 1fr);
      border-top: 1.5px solid var(--border);
    }
    .stat-item { padding: 16px 8px; text-align: center; border-right: 1.5px solid var(--border); }
    .stat-item:last-child { border-right: none; }
    .stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; color: var(--dark); display: block; }
    .stat-label { font-size: 0.68rem; font-weight: 700; color: #aaa; letter-spacing: 1px; text-transform: uppercase; }

    /* BADGES */
    .badges-block { padding: 16px 20px; border-top: 1.5px solid var(--border); }
    .badges-title { font-size: 0.72rem; font-weight: 700; letter-spacing: 2px; color: #aaa; text-transform: uppercase; margin-bottom: 12px; }
    .badges { display: flex; flex-wrap: wrap; gap: 8px; }
    .badge {
      padding: 5px 12px; font-size: 0.75rem; font-weight: 700;
      border: 1.5px solid var(--border); color: #555;
      display: flex; align-items: center; gap: 5px;
      transition: all 0.15s;
    }
    .badge.earned { border-color: var(--saffron); color: var(--saffron); background: rgba(255,107,26,0.06); }
    .badge.locked { opacity: 0.4; }

    /* EDIT BTN */
    .edit-btn {
      display: block; width: calc(100% - 40px); margin: 16px 20px 20px;
      background: none; border: 1.5px solid var(--border);
      padding: 10px; font-family: 'Syne', sans-serif; font-weight: 700;
      font-size: 0.82rem; cursor: pointer; color: #666; transition: all 0.15s;
      letter-spacing: 0.5px;
    }
    .edit-btn:hover { border-color: var(--saffron); color: var(--saffron); }

    /* MAIN CONTENT */
    .main-content { min-width: 0; }

    /* TABS */
    .tabs {
      display: flex; gap: 0; margin-bottom: 20px;
      border-bottom: 2px solid var(--border);
    }
    .tab-btn {
      padding: 12px 20px; background: none; border: none;
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.85rem;
      cursor: pointer; color: #aaa; transition: color 0.15s;
      position: relative; letter-spacing: 0.5px;
    }
    .tab-btn.active { color: var(--dark); }
    .tab-btn.active::after {
      content: ''; position: absolute; bottom: -2px; left: 0; right: 0;
      height: 2px; background: var(--saffron);
    }
    .tab-btn:hover { color: var(--dark); }

    /* TAB CONTENT */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* MY SCENES */
    .my-scene-card {
      background: white; border: 1.5px solid var(--border);
      padding: 20px 24px; margin-bottom: 12px;
      transition: transform 0.2s; position: relative;
      animation: slideIn 0.3s ease;
    }
    .my-scene-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.07); }
    .my-scene-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; }
    .my-scene-text { font-size: 0.95rem; line-height: 1.6; color: #222; flex: 1; margin-right: 16px; }
    .my-scene-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .action-btn {
      padding: 5px 12px; border: 1.5px solid var(--border); background: none;
      font-family: 'Syne', sans-serif; font-size: 0.75rem; font-weight: 700;
      cursor: pointer; color: #888; transition: all 0.15s;
    }
    .action-btn:hover { border-color: var(--hot-pink); color: var(--hot-pink); }
    .my-scene-footer { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .tag-small {
      font-size: 0.7rem; font-weight: 700; padding: 4px 10px;
      background: #f5f5f5; color: #666; letter-spacing: 0.5px;
    }
    .down-pill {
      margin-left: auto;
      background: var(--deep-teal); color: white;
      font-size: 0.75rem; font-weight: 700; padding: 5px 14px;
      display: flex; align-items: center; gap: 6px;
    }
    .down-pill .dot { width: 6px; height: 6px; background: var(--soft-yellow); border-radius: 50%; }

    /* WHO'S DOWN */
    .whos-down-card {
      background: white; border: 1.5px solid var(--border);
      padding: 20px 24px; margin-bottom: 12px;
      animation: slideIn 0.3s ease;
    }
    .wd-header { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
    .wd-scene-text { font-size: 0.85rem; font-weight: 600; color: var(--dark); flex: 1; }
    .wd-count { font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; color: var(--saffron); }
    .wd-people { display: flex; flex-direction: column; gap: 8px; }
    .wd-person {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 14px; background: #fafafa;
      border: 1px solid var(--border); transition: background 0.15s;
    }
    .wd-person:hover { background: rgba(255,107,26,0.04); }
    .wd-avatar {
      width: 34px; height: 34px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 0.78rem; color: white; flex-shrink: 0;
    }
    .wd-name { font-weight: 700; font-size: 0.88rem; color: var(--dark); }
    .wd-college { font-size: 0.75rem; color: #999; }
    .wd-time { font-size: 0.72rem; color: #bbb; margin-left: auto; font-weight: 600; }

    /* ACTIVITY */
    .activity-item {
      display: flex; gap: 14px; padding: 14px 0;
      border-bottom: 1px solid rgba(0,0,0,0.05);
      animation: slideIn 0.3s ease;
    }
    .activity-item:last-child { border-bottom: none; }
    .activity-icon {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; flex-shrink: 0;
    }
    .activity-icon.green { background: rgba(34,197,94,0.12); }
    .activity-icon.orange { background: rgba(255,107,26,0.12); }
    .activity-icon.blue { background: rgba(99,102,241,0.12); }
    .activity-body { flex: 1; }
    .activity-text { font-size: 0.88rem; color: #444; line-height: 1.5; }
    .activity-text strong { color: var(--dark); }
    .activity-time { font-size: 0.72rem; color: #bbb; font-weight: 600; margin-top: 3px; }

    /* EMPTY */
    .empty {
      text-align: center; padding: 60px 24px;
      background: white; border: 1.5px solid var(--border);
    }
    .empty-emoji { font-size: 3rem; display: block; margin-bottom: 12px; }
    .empty-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; color: var(--dark); margin-bottom: 8px; }
    .empty-sub { color: #888; font-size: 0.88rem; margin-bottom: 20px; }

    /* EDIT MODAL */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      z-index: 500; display: none; align-items: center; justify-content: center;
      backdrop-filter: blur(4px);
    }
    .modal-overlay.open { display: flex; }
    .modal { background: white; width: 480px; max-width: 95vw; animation: modalIn 0.3s ease; }
    .modal-header {
      background: var(--dark); padding: 20px 24px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: 2px; color: var(--cream); }
    .modal-close { background: none; border: none; color: var(--cream); font-size: 1.4rem; cursor: pointer; opacity: 0.6; }
    .modal-close:hover { opacity: 1; }
    .modal-body { padding: 28px 24px; }
    .form-group { margin-bottom: 20px; }
    .form-label { display: block; font-weight: 700; font-size: 0.78rem; letter-spacing: 1px; text-transform: uppercase; color: #555; margin-bottom: 8px; }
    .form-input, .form-select {
      width: 100%; border: 1.5px solid var(--border); padding: 12px 16px;
      font-family: 'Syne', sans-serif; font-size: 0.95rem; outline: none;
      transition: border-color 0.2s; background: #fafafa; color: var(--dark);
    }
    .form-input:focus, .form-select:focus { border-color: var(--saffron); background: white; }
    .save-btn {
      width: 100%; background: var(--saffron); color: white; border: none;
      padding: 14px; font-family: 'Syne', sans-serif; font-weight: 800;
      font-size: 0.95rem; cursor: pointer; transition: background 0.2s;
    }
    .save-btn:hover { background: #e55a0f; }

    /* TOAST */
    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--dark); color: var(--cream);
      padding: 14px 28px; font-weight: 700; font-size: 0.9rem;
      z-index: 999; transition: transform 0.3s ease; white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { background: #22c55e; }
    .toast.error { background: var(--hot-pink); }

    /* LOGGED OUT STATE */
    .logged-out {
      max-width: 480px; margin: 80px auto; text-align: center;
      padding: 24px;
    }
    .logged-out-emoji { font-size: 4rem; display: block; margin-bottom: 20px; }
    .logged-out-title { font-family: 'Bebas Neue', sans-serif; font-size: 3rem; color: var(--dark); margin-bottom: 12px; }
    .logged-out-sub { color: #888; font-size: 1rem; line-height: 1.7; margin-bottom: 32px; }

    @keyframes slideIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes modalIn { from { opacity: 0; transform: scale(0.95) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

    .av-0{background:#FF6B1A} .av-1{background:#0A3D3D} .av-2{background:#FF2D6B}
    .av-3{background:#6366f1} .av-4{background:#f59e0b} .av-5{background:#10b981}

    @media(max-width:700px){
      .layout{grid-template-columns:1fr;}
      .profile-card{position:static;}
    }
  </style>
</head>
<body>

  <!-- TOPBAR -->
  <nav class="topbar">
    <a href="index.html" class="topbar-logo">Add<span>a</span></a>
    <div class="topbar-nav">
      <a href="feed.html" class="nav-link">Feed</a>
      <a href="profile.html" class="nav-link active">Profile</a>
    </div>
    <button class="post-btn" onclick="window.location.href='feed.html'">+ Scene Banao</button>
  </nav>

  <!-- LOGGED OUT STATE -->
  <div class="logged-out" id="loggedOutState" style="display:none;">
    <span class="logged-out-emoji">🔐</span>
    <div class="logged-out-title">Pehle Login Kar</div>
    <p class="logged-out-sub">Profile dekhne ke liye aur apne scenes track karne ke liye login karna padega bhai.</p>
    <button class="post-btn" style="padding:14px 40px; font-size:1rem;" onclick="window.location.href='feed.html'">Feed Pe Ja → Login Karo</button>
  </div>

  <!-- MAIN LAYOUT -->
  <div class="layout" id="mainLayout">

    <!-- SIDEBAR: PROFILE CARD -->
    <aside>
      <div class="profile-card">
        <div class="profile-banner"></div>
        <div class="profile-avatar-wrap">
          <div class="profile-avatar" id="profileAvatar">?</div>
        </div>
        <div class="profile-info">
          <div class="profile-name" id="profileName">—</div>
          <div class="profile-college"><strong id="profileCollege">—</strong> · Delhi University</div>
        </div>

        <div class="score-block">
          <div class="score-num" id="scoreNum">0</div>
          <div class="score-info">
            <div class="score-label">Adda Score</div>
            <div class="score-title" id="scoreTitle">Naya Banda</div>
          </div>
        </div>

        <div class="score-bar-wrap">
          <div class="score-bar-label">
            <span>Scenes Posted</span>
            <span id="sceneBarVal">0/10</span>
          </div>
          <div class="score-bar"><div class="score-bar-fill" id="sceneBar" style="width:0%"></div></div>

          <div class="score-bar-label">
            <span>Times Gone Down</span>
            <span id="downBarVal">0/20</span>
          </div>
          <div class="score-bar"><div class="score-bar-fill" id="downBar" style="width:0%; background:var(--deep-teal)"></div></div>
        </div>

        <div class="stats-row">
          <div class="stat-item">
            <span class="stat-num" id="statScenes">0</span>
            <span class="stat-label">Scenes</span>
          </div>
          <div class="stat-item">
            <span class="stat-num" id="statDowns">0</span>
            <span class="stat-label">Got Down</span>
          </div>
          <div class="stat-item">
            <span class="stat-num" id="statJoined">0</span>
            <span class="stat-label">Joined</span>
          </div>
        </div>

        <div class="badges-block">
          <div class="badges-title">Badges</div>
          <div class="badges" id="badgesContainer"></div>
        </div>

        <button class="edit-btn" onclick="openEditModal()">✏ Profile Edit Karo</button>
      </div>
    </aside>

    <!-- MAIN: TABS -->
    <main class="main-content">
      <div class="tabs">
        <button class="tab-btn active" data-tab="my-scenes">Mere Scenes</button>
        <button class="tab-btn" data-tab="whos-down">Kaun Hai Down</button>
        <button class="tab-btn" data-tab="activity">Activity</button>
      </div>

      <!-- MY SCENES -->
      <div class="tab-panel active" id="tab-my-scenes">
        <div id="myScenesContainer"></div>
      </div>

      <!-- WHO'S DOWN -->
      <div class="tab-panel" id="tab-whos-down">
        <div id="whosDownContainer"></div>
      </div>

      <!-- ACTIVITY -->
      <div class="tab-panel" id="tab-activity">
        <div style="background:white; border:1.5px solid var(--border); padding: 24px;" id="activityContainer"></div>
      </div>
    </main>
  </div>

  <!-- EDIT PROFILE MODAL -->
  <div class="modal-overlay" id="editModal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">Profile Edit Karo</span>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Tera Naam</label>
          <input class="form-input" id="editName" placeholder="First name" />
        </div>
        <div class="form-group">
          <label class="form-label">College</label>
          <select class="form-select" id="editCollege">
            <option value="">Select college</option>
            <option>Hansraj College</option>
            <option>Miranda House</option>
            <option>SRCC</option>
            <option>Hindu College</option>
            <option>Kirori Mal</option>
            <option>St. Stephen's</option>
            <option>LSR</option>
            <option>Ramjas College</option>
            <option>Daulat Ram</option>
            <option>Other DU College</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Favourite Area in Delhi</label>
          <input class="form-input" id="editArea" placeholder="Kamla Nagar, Hauz Khas..." />
        </div>
        <button class="save-btn" onclick="saveProfile()">Save Karo ✓</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // =====================
    // STATE
    // =====================
    let currentUser = JSON.parse(localStorage.getItem('adda_user') || 'null');
    let scenes = JSON.parse(localStorage.getItem('adda_scenes') || '[]');

    const vibeEmoji = { chill:'☕', concert:'🎵', food:'🍕', study:'📚', sports:'🏏', night:'🌙' };
    const vibeLabel = { chill:'Chill', concert:'Concert', food:'Food', study:'Study', sports:'Sports', night:'Night Out' };

    const avatarColors = ['#FF6B1A','#0A3D3D','#FF2D6B','#6366f1','#f59e0b','#10b981'];

    // =====================
    // INIT
    // =====================
    function init() {
      if (!currentUser) {
        document.getElementById('mainLayout').style.display = 'none';
        document.getElementById('loggedOutState').style.display = 'block';
        return;
      }
      renderProfile();
      renderMyScenes();
      renderWhosDown();
      renderActivity();
    }

    // =====================
    // PROFILE
    // =====================
    function renderProfile() {
      const myScenes = scenes.filter(s => s.name === currentUser.name && s.college === currentUser.college);
      const totalDowns = myScenes.reduce((a, s) => a + s.downCount, 0);
      const joinedCount = scenes.filter(s => s.downedBy && s.downedBy.includes(currentUser.phone)).length;

      // Avatar
      const initials = currentUser.name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0,2);
      const el = document.getElementById('profileAvatar');
      el.textContent = initials;
      el.style.background = avatarColors[currentUser.name.charCodeAt(0) % 6];

      document.getElementById('profileName').textContent = currentUser.name;
      document.getElementById('profileCollege').textContent = currentUser.college;
      document.getElementById('statScenes').textContent = myScenes.length;
      document.getElementById('statDowns').textContent = totalDowns;
      document.getElementById('statJoined').textContent = joinedCount;

      // Score
      const score = myScenes.length * 10 + totalDowns * 5 + joinedCount * 3;
      document.getElementById('scoreNum').textContent = score;
      document.getElementById('scoreTitle').textContent = getScoreTitle(score);

      // Bars
      const sceneBarPct = Math.min(100, (myScenes.length / 10) * 100);
      const downBarPct = Math.min(100, (totalDowns / 20) * 100);
      setTimeout(() => {
        document.getElementById('sceneBar').style.width = sceneBarPct + '%';
        document.getElementById('downBar').style.width = downBarPct + '%';
      }, 200);
      document.getElementById('sceneBarVal').textContent = `${myScenes.length}/10`;
      document.getElementById('downBarVal').textContent = `${totalDowns}/20`;

      // Badges
      renderBadges(myScenes.length, totalDowns, joinedCount);
    }

    function getScoreTitle(score) {
      if (score === 0) return 'Naya Banda';
      if (score < 20) return 'Scene Explorer';
      if (score < 50) return 'Regular Yaar';
      if (score < 100) return 'Adda King';
      return 'Legendary 🔥';
    }

    function renderBadges(scenes, downs, joined) {
      const allBadges = [
        { id: 'first', emoji: '🌟', label: 'First Scene', earned: scenes >= 1 },
        { id: 'social', emoji: '🤝', label: 'Social Butterfly', earned: downs >= 5 },
        { id: 'explorer', emoji: '📍', label: 'Area Explorer', earned: joined >= 3 },
        { id: 'regular', emoji: '☕', label: 'Chai Addict', earned: scenes >= 5 },
        { id: 'popular', emoji: '🔥', label: 'Scene Maker', earned: downs >= 10 },
        { id: 'legend', emoji: '👑', label: 'Adda Legend', earned: scenes >= 10 && downs >= 20 },
      ];
      document.getElementById('badgesContainer').innerHTML = allBadges.map(b => `
        <div class="badge ${b.earned ? 'earned' : 'locked'}" title="${b.earned ? 'Earned!' : 'Not yet'}">
          ${b.emoji} ${b.label}
        </div>
      `).join('');
    }

    // =====================
    // MY SCENES
    // =====================
    function renderMyScenes() {
      const myScenes = scenes
        .filter(s => s.name === currentUser.name && s.college === currentUser.college)
        .sort((a, b) => b.timestamp - a.timestamp);

      const container = document.getElementById('myScenesContainer');
      if (myScenes.length === 0) {
        container.innerHTML = `
          <div class="empty">
            <span class="empty-emoji">🎭</span>
            <div class="empty-title">Koi Scene Nahi Abhi</div>
            <p class="empty-sub">Pehla scene post kar — log aa jayenge.</p>
            <button class="post-btn" style="padding:12px 28px;" onclick="window.location.href='feed.html'">Scene Banao →</button>
          </div>`;
        return;
      }

      container.innerHTML = myScenes.map(s => `
        <div class="my-scene-card">
          <div class="my-scene-top">
            <p class="my-scene-text">${s.text}</p>
            <div class="my-scene-actions">
              <button class="action-btn" onclick="deleteScene('${s.id}')">🗑 Delete</button>
            </div>
          </div>
          <div class="my-scene-footer">
            <span class="tag-small">${vibeEmoji[s.vibe] || '🔥'} ${vibeLabel[s.vibe] || s.vibe}</span>
            <span class="tag-small">📍 ${s.area}</span>
            <span class="tag-small">⏰ ${s.when}</span>
            <span class="tag-small">🕐 ${getTimeAgo(s.timestamp)}</span>
            <div class="down-pill">
              <div class="dot"></div>
              ${s.downCount} ${s.downCount === 1 ? 'person' : 'log'} down
            </div>
          </div>
        </div>
      `).join('');
    }

    function deleteScene(id) {
      if (!confirm('Scene delete karna chahte ho?')) return;
      scenes = scenes.filter(s => s.id !== id);
      localStorage.setItem('adda_scenes', JSON.stringify(scenes));
      renderProfile();
      renderMyScenes();
      renderWhosDown();
      renderActivity();
      showToast('Scene delete ho gaya', '');
    }

    // =====================
    // WHO'S DOWN
    // =====================
    function renderWhosDown() {
      const myScenes = scenes.filter(s =>
        s.name === currentUser.name &&
        s.college === currentUser.college &&
        s.downCount > 0
      );

      const container = document.getElementById('whosDownContainer');
      if (myScenes.length === 0) {
        container.innerHTML = `
          <div class="empty">
            <span class="empty-emoji">👀</span>
            <div class="empty-title">Abhi Koi Nahi</div>
            <p class="empty-sub">Jab log tere scene pe down karenge, yahan dikhenge.</p>
          </div>`;
        return;
      }

      // Generate fake "down" people for seeded scenes to make it feel real
      const fakeUsers = [
        { name: 'Anjali M.', college: 'Miranda House', color: 2 },
        { name: 'Rohan K.', college: 'Hindu College', color: 3 },
        { name: 'Simran P.', college: 'LSR', color: 5 },
        { name: 'Vivek S.', college: 'Hansraj College', color: 0 },
        { name: 'Diksha R.', college: 'Ramjas College', color: 4 },
      ];

      container.innerHTML = myScenes.map(scene => {
        const people = fakeUsers.slice(0, scene.downCount);
        return `
          <div class="whos-down-card">
            <div class="wd-header">
              <span style="font-size:1.2rem">${vibeEmoji[scene.vibe] || '🔥'}</span>
              <p class="wd-scene-text">${scene.text.slice(0, 80)}${scene.text.length > 80 ? '...' : ''}</p>
              <span class="wd-count">${scene.downCount} DOWN</span>
            </div>
            <div class="wd-people">
              ${people.map((p, i) => `
                <div class="wd-person">
                  <div class="wd-avatar av-${p.color}">${p.name.split(' ').map(n=>n[0]).join('')}</div>
                  <div>
                    <div class="wd-name">${p.name}</div>
                    <div class="wd-college">${p.college}</div>
                  </div>
                  <div class="wd-time">${getTimeAgo(scene.timestamp + i * 1000 * 60 * 3)}</div>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      }).join('');
    }

    // =====================
    // ACTIVITY
    // =====================
    function renderActivity() {
      const myScenes = scenes.filter(s => s.name === currentUser.name && s.college === currentUser.college);
      const joinedScenes = scenes.filter(s => s.downedBy && s.downedBy.includes(currentUser.phone));

      const activities = [];

      myScenes.forEach(s => {
        activities.push({ type: 'posted', text: `Tu ne scene post kiya: <strong>"${s.text.slice(0,60)}..."</strong>`, time: s.timestamp, icon: '🎯', color: 'orange' });
        if (s.downCount > 0) {
          activities.push({ type: 'down', text: `<strong>${s.downCount} log</strong> tere scene pe down hue`, time: s.timestamp + 1000*60*10, icon: '🔥', color: 'green' });
        }
      });

      joinedScenes.forEach(s => {
        activities.push({ type: 'joined', text: `Tu <strong>${s.name}'s</strong> scene pe down hua (${s.area})`, time: s.timestamp + 1000*60*5, icon: '✓', color: 'blue' });
      });

      activities.sort((a, b) => b.time - a.time);

      const container = document.getElementById('activityContainer');
      if (activities.length === 0) {
        container.innerHTML = `
          <div style="text-align:center; padding:40px 0;">
            <span style="font-size:2.5rem; display:block; margin-bottom:12px;">📭</span>
            <div style="font-family:'Bebas Neue',sans-serif; font-size:1.6rem; color:var(--dark); margin-bottom:8px;">Koi Activity Nahi</div>
            <p style="color:#888; font-size:0.88rem;">Scene banao, log milenge, activity barhegi.</p>
          </div>`;
        return;
      }

      container.innerHTML = activities.slice(0, 20).map(a => `
        <div class="activity-item">
          <div class="activity-icon ${a.color}">${a.icon}</div>
          <div class="activity-body">
            <div class="activity-text">${a.text}</div>
            <div class="activity-time">${getTimeAgo(a.time)}</div>
          </div>
        </div>
      `).join('');
    }

    // =====================
    // EDIT PROFILE
    // =====================
    function openEditModal() {
      document.getElementById('editName').value = currentUser.name || '';
      document.getElementById('editCollege').value = currentUser.college || '';
      document.getElementById('editArea').value = currentUser.area || '';
      document.getElementById('editModal').classList.add('open');
    }

    function saveProfile() {
      const name = document.getElementById('editName').value.trim();
      const college = document.getElementById('editCollege').value;
      const area = document.getElementById('editArea').value.trim();
      if (!name) return showToast('Naam daal', 'error');
      if (!college) return showToast('College select karo', 'error');
      currentUser = { ...currentUser, name, college, area };
      localStorage.setItem('adda_user', JSON.stringify(currentUser));
      closeModal();
      renderProfile();
      renderMyScenes();
      showToast('Profile update ho gaya ✓', 'success');
    }

    function closeModal() { document.getElementById('editModal').classList.remove('open'); }
    document.getElementById('editModal').addEventListener('click', e => {
      if (e.target === document.getElementById('editModal')) closeModal();
    });

    // =====================
    // TABS
    // =====================
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
      });
    });

    // =====================
    // UTILS
    // =====================
    function getTimeAgo(timestamp) {
      const diff = Date.now() - timestamp;
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return 'Abhi abhi';
      if (mins < 60) return `${mins}m pehle`;
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return `${hrs}h pehle`;
      return `${Math.floor(hrs/24)}d pehle`;
    }

    let toastTimer;
    function showToast(msg, type = '') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast show' + (type ? ' ' + type : '');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
    }

    // =====================
    // BOOT
    // =====================
    init();
  </script>
</body>
</html>
